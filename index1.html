<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>定位展示知识点</title>
  <link rel="stylesheet" href="index1.css">
</head>
<body>
  <div class="stage">
    <h1 class="page-title">HTML / CSS / JavaScript 知识点</h1>

    <!-- 左上：HTML区块 -->
    <section class="panel panel--html">
      <h2>HTML基础和HTML5</h2>
      <ul>
        <li>HTML5音频</li>
        <li>HTML5视频（视频和音频）</li>
        <li>HTML5图像（画布和SVG）</li>
        <li>HTML5地理定位</li>
        <li>HTML5标准</li>
      </ul>
    </section>

    <!-- 左下：CSS区块 -->
    <section class="panel panel--css">
      <h2>CSS基础和CSS3</h2>
      <ul>
        <li>CSS选择器</li>
        <li>CSS盒模型</li>
        <li>浮动与清除</li>
        <li>定位相对与绝对</li>
        <li>CSS3过渡与动画</li>
        <li>CSS3的滤镜效果</li>
      </ul>
    </section>

    <!-- 右下：JavaScript区块 -->
    <section class="panel panel--js">
      <h2>JavaScript</h2>
      <ul>
        <li>数据类型</li>
        <li>运算符</li>
        <li>函数语法</li>
        <li>BOM对象</li>
        <li>DOM操作</li>
        <li>JS事件</li>
      </ul>
    </section>

    <!-- 中心：椭圆叠加（绝对定位+z-index） -->
    <div class="badge">
      <div class="shield shield--html">HTML</div>
      <div class="shield shield--css">CSS</div>
      <div class="digits">
        <span class="d5">5</span>
        <span class="d3">3</span>
      </div>
    </div>
  </div>
</body>
</html>
