<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>李泰锟的个人主页</title>
    <link rel="stylesheet" href="lab1-108-李泰锟-styles.css">
</head>
<body>
    <div class="container">
        <p class="intro">
            大家好！我是李泰锟
        </p>
        <img src="tupian1.png" alt="个人头像" 
             style="width: 50px; height: 50px; background-repeat: repeat;" 
             class="avatar">
        <h3>我的兴趣爱好</h3>
        <ul class="hobbies">
            <li>编程 (Java, Python, Web开发)</li>
            <li>打篮球</li>
            <li>听音乐</li>
            <li>户外徒步</li>
        </ul>
        <div class="link-section">
            <a href="https://baidu.com" target="_blank"
               style="color: black; text-decoration: none;"
               onmouseover="this.style.color='red'; this.style.textDecoration='underline'"
               onmouseout="this.style.color='black'; this.style.textDecoration='none'"
               onmousedown="this.style.color='blue'"
               onmouseup="this.style.color='red'">
                访问我的百度
            </a>
        </div>
    </div>
</body>
</html>
