<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新闻资讯</title>
  <link rel="stylesheet" href="index2.css">
</head>
<body>
  <div class="news-wrap">
    <header class="news-header">
    </header>

    <div class="crumbs">
      <span class="crumb">频道</span>
      <span class="crumb">科技</span>
      <span class="crumb-sep">›</span>
      <span class="crumb pill">太空探测</span>
    </div>

    <div class="content">
      <main class="news-list">
      <!-- 新闻块 1 -->
      <article class="news-item">
        <h2 class="news-title">飞行了200多亿公里的旅行者1号，为何不会撞上太空中的小行星</h2>
        <div class="news-body">
          <div class="thumbs">
            <img class="thumb" src="tupian1.png" alt="缩略图1">
            <img class="thumb" src="tupian1.png" alt="缩略图2">
          </div>
        </div>
      </article>

      <!-- 新闻块 2 -->
      <article class="news-item">
        <h2 class="news-title">欧洲探测器从4亿公里外传回多张照片</h2>
        <div class="news-body">
          <div class="thumbs">
            <img class="thumb" src="tupian1.png" alt="缩略图1">
            <img class="thumb" src="tupian1.png" alt="缩略图2">
          </div>
        </div>
      </article>

      <!-- 新闻块 3 -->
      <article class="news-item">
        <h2 class="news-title">为什么太空没有氧气，陨石仍然能够燃烧</h2>
        <div class="news-body">
          <div class="thumbs">
            <img class="thumb" src="tupian1.png" alt="缩略图1">
            <img class="thumb" src="tupian1.png" alt="缩略图2">
          </div>
        </div>
      </article>
      </main>

      <aside class="hot-list">
        <h2 class="hot-heading">热文推荐</h2>
        <section class="hot-item">
          <h3 class="hot-title">研究表明：人类的自然寿命为120岁</h3>
          <img class="hot-thumb" src="tupian1.png" alt="热文配图1">
        </section>
        <section class="hot-item">
          <h3 class="hot-title">白墙脏了不用重新刷，一个窍门，简单一擦，立马干净如新</h3>
          <img class="hot-thumb" src="tupian1.png" alt="热文配图2">
        </section>
        <section class="hot-item">
          <h3 class="hot-title">俗语“八月十二用一宝，四季无烦恼”，一宝竟是盐水</h3>
          <img class="hot-thumb" src="tupian1.png" alt="热文配图3">
        </section>
      </aside>
    </div>
  </div>
</body>
</html>
